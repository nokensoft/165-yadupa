<!DOCTYPE html>
<html lang="id" class="h-full scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blog | YADUPA</title>

    <link rel="icon" type="image/png" sizes="32x32" href="public/img/logo-yadupa.png">
    <link rel="apple-touch-icon" sizes="180x180" href="public/img/logo-yadupa.png">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,400;0,700;0,800;1,800&display=swap" rel="stylesheet">

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="js/blade.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['"Plus Jakarta Sans"', 'sans-serif'],
                    },
                    colors: {
                        'papua-brown': '#A0522D',
                        'papua-gold': '#FFD700',
                        'papua-red': '#D2691E',
                        'papua-black': '#1A1A1A'
                    }
                }
            }
        }
    </script>

    <link rel="stylesheet" href="css/app.css">

<body class="bg-white font-sans antialiased text-gray-800 leading-relaxed overflow-x-hidden">

    <div x-data x-include="partials.header"></div>

    <main>
        <div x-data x-include="pages.blog"></div>
    </main>

    <div x-data x-include="partials.footer"></div>

</body>
</html>
