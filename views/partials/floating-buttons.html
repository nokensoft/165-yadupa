<div x-data="{ showTop: false }" @scroll.window="showTop = (window.pageYOffset > 400)" class="fixed bottom-8 right-8 z-50 flex flex-col gap-3">
    <!-- Instagram -->
    <a href="https://instagram.com" target="_blank" class="w-14 h-14 bg-gradient-to-br from-purple-500 to-pink-500 text-white rounded-full flex items-center justify-center shadow-xl hover:scale-110 transition-all">
        <i class="fab fa-instagram text-xl"></i>
    </a>

    <!-- WhatsApp -->
    <a href="https://wa.me/6281234567890" target="_blank" class="w-14 h-14 bg-green-500 text-white rounded-full flex items-center justify-center shadow-xl hover:scale-110 transition-all">
        <i class="fab fa-whatsapp text-xl"></i>
    </a>

    <!-- Back to Top -->
    <button x-show="showTop" x-cloak
            x-transition:enter="transition ease-out duration-300"
            x-transition:enter-start="opacity-0 translate-y-4"
            x-transition:enter-end="opacity-100 translate-y-0"
            x-transition:leave="transition ease-in duration-200"
            x-transition:leave-start="opacity-100 translate-y-0"
            x-transition:leave-end="opacity-0 translate-y-4"
            @click="window.scrollTo({ top: 0, behavior: 'smooth' })"
            class="w-14 h-14 bg-papua-brown text-white rounded-full flex items-center justify-center shadow-xl hover:scale-110 transition-all">
        <i class="fas fa-arrow-up text-xl"></i>
    </button>
</div>
