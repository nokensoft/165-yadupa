<section class="py-24 bg-gray-50 overflow-hidden">
    <div class="max-w-7xl mx-auto px-6 mb-12">
        <div class="flex flex-col md:flex-row justify-between items-end gap-6">
            <div class="space-y-4">
                <h2 class="text-5xl font-black text-papua-brown uppercase italic tracking-tighter"><i class="fas fa-images mr-2"></i> Galeri Kegiatan</h2>
                <div class="w-24 h-3 bg-papua-red rounded-full"></div>
            </div>
            <p class="text-gray-500 text-lg max-w-md">Dokumentasi kegiatan YADUPA bersama masyarakat adat di berbagai wilayah Papua.</p>
        </div>
    </div>

    <!-- Auto-scroll Gallery -->
    <div x-data="{
            images: [
                { src: 'https://images.unsplash.com/photo-1542601906990-b4d3fb778b09?auto=format&fit=crop&w=500&q=80', srcLarge: 'https://images.unsplash.com/photo-1542601906990-b4d3fb778b09?auto=format&fit=crop&w=1200&q=80', caption: 'Program Literasi di Lembah Baliem' },
                { src: 'https://images.unsplash.com/photo-1509316975850-ff9c5deb0cd9?auto=format&fit=crop&w=500&q=80', srcLarge: 'https://images.unsplash.com/photo-1509316975850-ff9c5deb0cd9?auto=format&fit=crop&w=1200&q=80', caption: 'Pemetaan Hutan Adat Wilayah Arso' },
                { src: 'https://images.unsplash.com/photo-1441974231531-c6227db76b6e?auto=format&fit=crop&w=500&q=80', srcLarge: 'https://images.unsplash.com/photo-1441974231531-c6227db76b6e?auto=format&fit=crop&w=1200&q=80', caption: 'Pelatihan Ekonomi Lokal' },
                { src: 'https://images.unsplash.com/photo-1518495973542-4542c06a5843?auto=format&fit=crop&w=500&q=80', srcLarge: 'https://images.unsplash.com/photo-1518495973542-4542c06a5843?auto=format&fit=crop&w=1200&q=80', caption: 'Dokumentasi Tradisi Lisan' },
                { src: 'https://images.unsplash.com/photo-1469474968028-56623f02e42e?auto=format&fit=crop&w=500&q=80', srcLarge: 'https://images.unsplash.com/photo-1469474968028-56623f02e42e?auto=format&fit=crop&w=1200&q=80', caption: 'Advokasi Hak Tanah Adat' },
                { src: 'https://images.unsplash.com/photo-1472214103451-9374bd1c798e?auto=format&fit=crop&w=500&q=80', srcLarge: 'https://images.unsplash.com/photo-1472214103451-9374bd1c798e?auto=format&fit=crop&w=1200&q=80', caption: 'Workshop Kerajinan Noken' },
                { src: 'https://images.unsplash.com/photo-1500382017468-9049fed747ef?auto=format&fit=crop&w=500&q=80', srcLarge: 'https://images.unsplash.com/photo-1500382017468-9049fed747ef?auto=format&fit=crop&w=1200&q=80', caption: 'Pendidikan Anak Dusun' },
                { src: 'https://images.unsplash.com/photo-1501854140801-50d01698950b?auto=format&fit=crop&w=500&q=80', srcLarge: 'https://images.unsplash.com/photo-1501854140801-50d01698950b?auto=format&fit=crop&w=1200&q=80', caption: 'Pelestarian Lingkungan Hidup' }
            ],
            modalOpen: false,
            modalImg: '',
            modalCaption: '',
            scrollEl: null,
            speed: 0.2,
            openModal(img) {
                this.modalImg = img.srcLarge;
                this.modalCaption = img.caption;
                this.modalOpen = true;
                this.speed = 0;
            },
            closeModal() {
                this.modalOpen = false;
                this.speed = 0.2;
            },
            init() {
                this.scrollEl = this.$refs.track;
                this.animate();
            },
            animate() {
                if (this.scrollEl) {
                    this.scrollEl.scrollLeft += this.speed;
                    if (this.scrollEl.scrollLeft >= this.scrollEl.scrollWidth / 2) {
                        this.scrollEl.scrollLeft = 0;
                    }
                }
                requestAnimationFrame(() => this.animate());
            }
        }"
        @mouseenter="speed = 0"
        @mouseleave="if (!modalOpen) speed = 0.2">

        <div x-ref="track" class="flex gap-6 overflow-hidden" style="scrollbar-width: none;">
            <template x-for="(img, i) in [...images, ...images]" :key="i">
                <div class="shrink-0 w-72 md:w-80 group cursor-pointer" @click="openModal(img)">
                    <div class="h-56 rounded-3xl overflow-hidden shadow-lg border border-gray-100 relative">
                        <img :src="img.src" :alt="img.caption" class="w-full h-full object-cover group-hover:scale-110 transition duration-700">
                        <div class="absolute inset-0 bg-black/0 group-hover:bg-black/20 transition flex items-center justify-center">
                            <i class="fas fa-search-plus text-white text-2xl opacity-0 group-hover:opacity-100 transition"></i>
                        </div>
                    </div>
                    <p class="text-center text-sm font-bold text-gray-500 mt-4" x-text="img.caption"></p>
                </div>
            </template>
        </div>

        <!-- Zoom Modal -->
        <div x-show="modalOpen" x-cloak
             x-transition:enter="transition ease-out duration-300"
             x-transition:enter-start="opacity-0"
             x-transition:enter-end="opacity-100"
             x-transition:leave="transition ease-in duration-200"
             x-transition:leave-start="opacity-100"
             x-transition:leave-end="opacity-0"
             @click="closeModal()"
             @keydown.escape.window="closeModal()"
             class="fixed inset-0 z-[999] bg-black/90 flex items-center justify-center p-6">
            <button @click="closeModal()" class="absolute top-6 right-6 w-12 h-12 bg-white/10 hover:bg-white/20 rounded-full flex items-center justify-center text-white text-2xl transition">
                <i class="fas fa-times"></i>
            </button>
            <div @click.stop class="max-w-5xl w-full">
                <img :src="modalImg" :alt="modalCaption" class="w-full max-h-[80vh] object-contain rounded-2xl shadow-2xl">
                <p class="text-center text-white font-bold text-lg mt-6" x-text="modalCaption"></p>
            </div>
        </div>
    </div>
</section>
